naftiko: 1.0.0-alpha2
info:
  label: Klaviyo API — Conversations
  description: 'Klaviyo API — Conversations. 1 operations. Lead operation: Create Conversation Message. Self-contained Naftiko
    capability covering one Klaviyo business surface.'
  tags:
  - Klaviyo
  - Conversations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    KLAVIYO_API_KEY: KLAVIYO_API_KEY
capability:
  consumes:
  - type: http
    namespace: klaviyo-conversations
    baseUri: https://a.klaviyo.com
    description: Klaviyo API — Conversations business capability. Self-contained, no shared references.
    resources:
    - name: api-conversation-messages
      path: /api/conversation-messages
      operations:
      - name: createconversationmessage
        method: POST
        description: Create Conversation Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: revision
          in: header
          type: string
          description: 'API endpoint revision (format: YYYY-MM-DD[.suffix])'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.KLAVIYO_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: klaviyo-conversations-rest
    port: 8080
    description: REST adapter for Klaviyo API — Conversations. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/api/conversation-messages
      name: api-conversation-messages
      description: REST surface for api-conversation-messages.
      operations:
      - method: POST
        name: createconversationmessage
        description: Create Conversation Message
        call: klaviyo-conversations.createconversationmessage
        with:
          revision: rest.revision
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: klaviyo-conversations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Klaviyo API — Conversations. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-conversation-message
      description: Create Conversation Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: klaviyo-conversations.createconversationmessage
      with:
        revision: tools.revision
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
