      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: klaviyo-tracking-settings.gettrackingsetting
      with:
        id: tools.id
        fields[tracking-setting]: tools.fields[tracking-setting]
        revision: tools.revision
