        destructive: false
        idempotent: true
      call: klaviyo-tracking-settings.gettrackingsettings
      with:
        fields[tracking-setting]: tools.fields[tracking-setting]
        page[cursor]: tools.page[cursor]
        page[size]: tools.page[size]
        revision: tools.revision
      outputParameters:
      - type: object
