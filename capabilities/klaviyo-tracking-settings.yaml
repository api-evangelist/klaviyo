        name: updatetrackingsetting
        description: Update Tracking Setting
        call: klaviyo-tracking-settings.updatetrackingsetting
        with:
          id: rest.id
          revision: rest.revision
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
