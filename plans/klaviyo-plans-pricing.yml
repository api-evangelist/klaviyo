specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Klaviyo
providerId: klaviyo
created: '2026-05-04'
modified: '2026-05-04'
reconciled: true
tags:
  - Email Marketing
  - SMS
  - CDP
description: Klaviyo pricing scales with active profiles. Email + SMS plans differ by send budget.
sources:
  - https://www.klaviyo.com/pricing
plans:
  - id: klaviyo-free
    name: Free
    type: freemium
    description: Up to 250 active profiles; 500 email sends/mo; 150 SMS credits/mo.
    entries:
      - label: Active profiles
        name: profiles
        type: quota
        metric: profile
        limit: 250
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: Email sends
        name: emails
        type: quota
        metric: email
        limit: 500
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
      - label: SMS credits
        name: sms_credits
        type: quota
        metric: credit
        limit: 150
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: All features included
      - name: 60 days email/chat support
  - id: klaviyo-email
    name: Email
    type: paid
    description: Starts $20/mo (251-500 profiles).
    entries:
      - label: Base 251-500 profiles
        name: tier_500
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '20.00'
        userMultiplied: false
      - label: 1,000 profiles
        name: tier_1k
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '30.00'
        userMultiplied: false
      - label: 5,000 profiles
        name: tier_5k
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '70.00'
        userMultiplied: false
      - label: 10,000 profiles
        name: tier_10k
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '130.00'
        userMultiplied: false
      - label: 50,000 profiles
        name: tier_50k
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '720.00'
        userMultiplied: false
    elements:
      - name: 5,000 monthly emails (at base)
      - name: 150 SMS credits
      - name: Unified profiles
      - name: 350+ integrations
      - name: AI segments and content
  - id: klaviyo-email-sms
    name: Email + SMS
    type: paid
