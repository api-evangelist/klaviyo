        name: tier_500
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '35.00'
        userMultiplied: false
      - label: SMS credits included
        name: sms_credits
        type: quota
        metric: credit
        limit: 1250
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
