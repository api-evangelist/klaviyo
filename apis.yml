apis:
  - aid: klaviyo:klaviyo-api
    name: Klaviyo API
    description: >-
      The Klaviyo API provides programmatic access to profiles, events, lists, segments,
      campaigns, flows, templates, catalogs, coupons, metrics, reviews, forms, images,
      tags, webhooks, tracking settings, custom objects, conversations, web feeds,
      data privacy, and reporting. It is used to build personalized customer experiences
      across email, SMS, mobile push, and other channels for ecommerce brands.
    humanURL: https://developers.klaviyo.com/
