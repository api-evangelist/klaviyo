description: Klaviyo is a marketing automation and customer data platform built for
  ecommerce. Build custom integrations to bring data into Klaviyo to create personalized
  experiences across email, SMS, mobile push, and more. The Klaviyo API exposes profiles,
  events, lists, segments, campaigns, flows, catalogs, coupons, metrics, reviews,
  templates, webhooks, and reporting endpoints for building rich integrations and
  data pipelines.
